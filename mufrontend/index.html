<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Музыка</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- БОКОВОЕ МЕНЮ -->
    <aside class="sidebar">
    <img src="images/penguin-logo.png" alt="логотип" class="sidebar-logo">
    <nav class="sidebar-nav">
        <button class="nav-btn active" title="Поиск">🔍</button>
        <button class="nav-btn" title="Музыка">🎵</button>
        <button class="nav-btn" title="Совместное прослушивание">🎧</button>
        <button class="nav-btn" title="Настройки">⚙️</button>
    </nav>
</aside>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-wrapper">

        <!-- ЦЕНТР — треки и плейлисты -->
        <div class="center-column">

            <section class="tracks-section">
                <h2>Все треки</h2>
                <div id="tracks-list"></div>
            </section>

            <section class="playlists-section">
                <h2>Плейлисты</h2>
                <div class="create-playlist">
                    <input type="text" id="playlist-name" placeholder="Название плейлиста">
                    <button onclick="createPlaylist()">Создать</button>
                </div>
                <div id="playlists-list"></div>
            </section>

            <section class="upload-section">
                <h2>Загрузить трек</h2>
                <input type="text" id="track-title" placeholder="Название трека">
                <input type="text" id="track-artist" placeholder="Артист">
                <input type="file" id="track-file" accept=".mp3,.wav,.ogg">
                <button onclick="uploadTrack()">Загрузить</button>
            </section>

        </div>

        <!-- ПРАВАЯ КОЛОНКА — плеер -->
        <div class="right-column">
            <div class="player-card">
                <img id="cover-image" src="images/penguin-logo.png" alt="Обложка">
                <div class="player-info">
                    <span id="current-title">Выбери трек</span>
                    <span id="current-artist">—</span>
                </div>
                <audio id="audio-player" controls></audio>
                <div class="like-buttons">
                    <button class="dislike-btn" onclick="dislikeTrack()">👎</button>
                    <button class="like-btn" onclick="likeTrack()">❤️</button>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
