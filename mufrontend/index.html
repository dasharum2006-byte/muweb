<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя Музыка</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- БОКОВОЕ МЕНЮ -->
<aside class="sidebar">
    <img src="images/penguin-logo.png" alt="логотип" class="sidebar-logo" onclick="showPage('home', null)" style="cursor:pointer">
    <nav class="sidebar-nav">
        <button class="nav-btn" title="Поиск" onclick="showPage('search',this)">🔍</button>
        <button class="nav-btn active" title="Музыка" onclick="showPage('music', this)">🎵</button>
        <button class="nav-btn" title="Плейлисты" onclick="showPage('playlists', this)">📁</button>
        <button class="nav-btn" title="Артисты" onclick="showPage('artists', this)">🎤</button>
        <button class="nav-btn" title="Совместное прослушивание" onclick="showPage('together', this)">🎧</button>
        <button class="nav-btn" title="Настройки" onclick="showPage('settings', this)">⚙️</button>

    </nav>
</aside>
<!--  в sidebar когда меню выдвигается подписи берутся из ::after в CSS через title. -->
<!-- ОСНОВНОЙ КОНТЕНТ -->
<div class="main-wrapper">

    <!-- ГЛАВНАЯ СТРАНИЦА (по умолчанию) -->
    <div id="page-home" class="page active-page">
    <div class="center-column">
        <section class="tracks-section">
            <h2>Топ 5 популярных</h2>
            <div id="top-tracks"></div>
        </section>
        <section class="tracks-section">
            <h2>Недавно добавленные</h2>
            <div id="recent-tracks"></div>
        </section>
    </div>
</div>

    <!-- СТРАНИЦА МУЗЫКИ -->
    <div id="page-music" class="page">
        <div class="center-column">
            <section class="tracks-section">
                <h2>Все треки</h2>
                <div id="tracks-list"></div>
            </section>
            <section class="upload-section">
                <h2>Загрузить трек</h2>
                <input type="text" id="track-title" placeholder="Название трека">
                <input type="text" id="track-artist" placeholder="Артист">
                <input type="text" id="track-cover-name" placeholder="Имя файла обложки">
                <!--кнопка для файла-->
                 <label class="custom-audio-upload">
                    <input type="file" id="track-file" accept="audio/*">
                     <span>🎵 Выбрать аудиофайл</span>
                    </label>
                <button onclick="uploadTrack()">Загрузить</button>
            </section>
        </div>
    </div>

    <!-- СТРАНИЦА ПОИСКА -->
   <div id="page-search" class="page">
    <div class="center-column">
        <section class="tracks-section">
            <h2>Поиск</h2>
            <input type="text" id="search-input" placeholder="Название или артист..." oninput="searchTracks()">
            <div id="search-results"></div>
        </section>
    </div>
</div>
   <!-- СТРАНИЦА ПЛЕЙЛИСТОВ -->
<div id="page-playlists" class="page">
    <div class="center-column">
        <section class="playlists-section">
            <h2>Мои плейлисты</h2>
            <div class="create-playlist">
                <input type="text" id="playlist-name" placeholder="Название плейлиста">
                <button onclick="createPlaylist()">Создать</button>
            </div>
            <div id="playlists-list"></div>
        </section>
    </div>
</div>

    <!-- СТРАНИЦА ВМЕСТЕ -->
    <div id="page-together" class="page">
        <div class="center-column">
            <h2>Слушать вместе</h2>
            <p>Скоро будетs</p>
        </div>
    </div>

    <!-- СТРАНИЦА АРТИСТОВ -->
<div id="page-artists" class="page">
    <div class="center-column" style="width:100%">
        <section class="tracks-section">
            <!--  новая анимированная полоска -->
            <div class="gradient-strip">
                <div class="snake-blob blob-1"></div>
                <div class="snake-blob blob-2"></div>
                <div class="snake-blob blob-3"></div>
                <div class="snake-blob blob-4"></div>
            </div>
            <h2>Артисты</h2>
            <!-- форма добавления артиста -->
            <div class="create-playlist" style="margin-bottom:20px">
                <input type="text" id="artist-name" placeholder="Имя артиста">
                
                <!-- Красивая кастомная кнопка загрузки файла -->
                <label class="custom-file-upload">
                    <input type="file" id="artist-photo" accept="image/*">
                <span>📎 Выбрать фото</span>
            </label>
        <button onclick="addArtist()">Добавить</button>
</div>

            <!-- карточки артистов -->
            <div id="artists-grid"></div>
        </section>
    </div>
</div>

<!-- СТРАНИЦА КОНКРЕТНОГО АРТИСТА -->
<div id="page-artist" class="page">
    <div class="center-column" style="width:100%">
        <button onclick="showPage('artists')" 
                style="background:none; border:none; color:var(--heading); 
                       font-size:1rem; cursor:pointer; margin-bottom:15px; padding:0">
            ← Назад к артистам
        </button>
        <section class="tracks-section">
            <div id="artist-header"></div>
            <div id="artist-tracks"></div>
        </section>
    </div>
</div>

<!-- СТРАНИЦА НАСТРОЕК -->
<div id="page-settings" class="page">
    <div class="settings-wrapper">
        <h2>Настройки</h2>
        <!-- профиль и пароль в одну строку -->
        <div class="settings-top-row">
            <div class="settings-profile">
                <div class="avatar-block">
                    <div class="avatar-preview" id="avatar-preview">
                        <span>👤</span>
                    </div>
                    <label class="avatar-label" for="avatar-input">Добавить аватар</label>
                    <input type="file" id="avatar-input" accept="image/*" onchange="uploadAvatar(this)">
                </div>
                <div class="profile-info">
                    <p class="profile-login" id="profile-login"></p>
                    <p class="profile-name" id="profile-name"></p>
                </div>
            </div>

            <div class="settings-section">
                <h3>Сменить пароль</h3>
                <input type="password" id="old-password" placeholder="Старый пароль">
                <input type="password" id="new-password" placeholder="Новый пароль">
                <button onclick="changePassword()">Сохранить</button>
                <p id="password-msg" class="settings-msg"></p>
            </div>
        </div>

        <!-- темы -->
        <div class="themes-block">
            <h3>Темы</h3>
            <div class="themes-list">
                <div class="theme-card" onclick="setTheme('pink', this)">
                    <div class="theme-preview pink-theme"></div>
                    <span>Розовая</span>
                </div>
                <div class="theme-card" onclick="setTheme('purple', this)">
                    <div class="theme-preview purple-theme"></div>
                    <span>Сиреневая</span>
                </div>
                <div class="theme-card" onclick="setTheme('blue', this)">
                    <div class="theme-preview blue-theme"></div>
                    <span>Голубая</span>
                </div>
                <div class="theme-card" onclick="setTheme('dark', this)">
                    <div class="theme-preview dark-theme"></div>
                    <span>Тёмная</span>
                </div>
            </div>
        </div>

        <!-- не понравилось -->
        <div class="settings-section">
            <h3>Не понравилось</h3>
            <div id="disliked-list"></div>
        </div>

        <!-- выйти -->
        <button class="logout-btn-settings" onclick="logout()">🚪 Выйти из аккаунта</button>

    </div>
</div>
 

    <!-- ПРАВАЯ КОЛОНКА — плеер (всегда виден) -->
    <div class="right-column">
        <div class="player-card">
            <img id="cover-image" src="images/penguin-logo.png" alt="Обложка">
            <!-- визуализация пятен -->
            <canvas id="blob-canvas" style="display:none; width:100%; aspect-ratio:1/1; border-radius:12px;"></canvas>
            <div class="player-info">
                <span id="current-title">Выбери трек</span>
                <span id="current-artist">—</span>
            </div>
            <!--меняем на другой плеер, controls убрали-->
            <audio id="audio-player"></audio>
            <!-- новый кастомный плеер -->
        <div class="custom-player">
            <div class="player-time">
                <span id="current-time">0:00</span>
                <span id="total-time">0:00</span>
            </div>
            <div class="progress-bar" onclick="seekAudio(event)">
                <div class="progress-fill" id="progress-fill"></div>
                <div class="progress-dot" id="progress-dot"></div>
            </div>
            <div class="player-controls">
                <button class="control-btn repeat-btn" id="repeat-btn" onclick="toggleRepeat()">⏸</button>
                <button class="control-btn" onclick="prevTrack()">⏮</button>
                <button class="control-btn play-btn" id="play-btn" onclick="togglePlay()">▶</button>
                <button class="control-btn" onclick="nextTrack()">⏭</button>
                <button class="star-btn" id="star-btn" onclick="toggleStars()">★</button>
            </div>
        </div>
        <!-- дизлайк, ромб, лайк -->
        <div class="like-buttons">
            <button class="dislike-btn" onclick="dislikeTrack()">👎</button>
            <button class="view-btn" onclick="togglePlayerView()">◆</button>
            <button class="like-btn" onclick="likeTrack(currentTrackId, this)">❤️</button>
        </div>

        <!-- 5 звёздочек снизу - скрыты по умолчанию -->
         <!-- звёздочки — появляются под like-buttons -->
        <div class="stars-popup" id="stars-popup" style="display:none">
            <span class="star" onclick="rateTrack(1)">☆</span>
            <span class="star" onclick="rateTrack(2)">☆</span>
            <span class="star" onclick="rateTrack(3)">☆</span>
            <span class="star" onclick="rateTrack(4)">☆</span>
            <span class="star" onclick="rateTrack(5)">☆</span>
        </div>
        <p class="avg-rating" id="avg-rating"></p>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
